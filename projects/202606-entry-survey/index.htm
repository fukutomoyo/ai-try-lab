<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-TRY-LAB 入部アンケート</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --ink:#0a0a14; --gold:#c9a84c; --gold-dim:#8a6f2e; --magic:#6e44ff; --parchment:#e8e4d8; --parchment-dark:#c9c3ae; --blood:#8b1a1a; }
html, body { min-height:100%; background:var(--ink); color:var(--parchment); font-family:'Noto Serif JP',serif; overflow-x:hidden; }
#stars-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; }
.stage { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:70px 16px 60px; }

#opening { position:fixed; inset:0; z-index:300; background:var(--ink); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px; transition:opacity 1s ease; }
#opening.fade-out { opacity:0; pointer-events:none; }
.opening-crest { font-size:60px; animation:floatCrest 3s ease-in-out infinite; filter:drop-shadow(0 0 20px var(--gold)); }
@keyframes floatCrest { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
.opening-title { font-family:'Cinzel',serif; font-size:clamp(22px,5vw,34px); color:var(--gold); letter-spacing:0.2em; text-shadow:0 0 30px rgba(201,168,76,0.6); text-align:center; padding:0 20px; }
.opening-sub { font-size:13px; color:var(--parchment-dark); letter-spacing:0.15em; text-align:center; min-height:1.6em; }
.typewriter { border-right:2px solid var(--gold); animation:blink 0.8s step-end infinite; }
@keyframes blink { 0%,100%{border-color:var(--gold);} 50%{border-color:transparent;} }
.start-btn { margin-top:8px; background:transparent; border:1px solid var(--gold); color:var(--gold); font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.2em; padding:13px 36px; cursor:pointer; transition:all 0.3s; position:relative; overflow:hidden; opacity:0; animation:fadeInBtn 1s ease 4s forwards; }
@keyframes fadeInBtn { to{opacity:1;} }
.start-btn::before { content:''; position:absolute; inset:0; background:var(--gold); transform:scaleX(0); transform-origin:left; transition:transform 0.3s; z-index:-1; }
.start-btn:hover { color:var(--ink); }
.start-btn:hover::before { transform:scaleX(1); }

.scroll-card { width:100%; max-width:560px; background:linear-gradient(165deg,#1c1a2e 0%,#14122a 40%,#0e0d1e 100%); border:1px solid var(--gold-dim); box-shadow:0 0 60px rgba(110,68,255,0.1),0 0 120px rgba(201,168,76,0.05); position:relative; }
.scroll-card::before { content:'✦'; position:absolute; top:12px; left:14px; color:var(--gold-dim); font-size:16px; opacity:0.5; }
.scroll-card::after { content:'✦'; position:absolute; bottom:12px; right:14px; color:var(--gold-dim); font-size:16px; opacity:0.5; }
.card-header { padding:26px 26px 20px; border-bottom:1px solid rgba(201,168,76,0.2); text-align:center; position:relative; }
.card-header::after { content:''; position:absolute; bottom:-1px; left:50%; transform:translateX(-50%); width:60px; height:2px; background:var(--gold); box-shadow:0 0 8px var(--gold); }
.guild-badge { display:inline-flex; align-items:center; gap:8px; background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.3); color:var(--gold); font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.2em; padding:5px 14px; margin-bottom:14px; }
.card-title { font-family:'Cinzel',serif; font-size:clamp(16px,4vw,22px); color:var(--parchment); letter-spacing:0.1em; margin-bottom:8px; }
.card-desc { font-size:12px; color:var(--parchment-dark); line-height:1.8; letter-spacing:0.05em; }
.benefit-rune { display:inline-flex; align-items:center; gap:6px; margin-top:12px; background:rgba(110,68,255,0.15); border:1px solid rgba(110,68,255,0.4); color:#a78bfa; font-size:11px; letter-spacing:0.08em; padding:6px 16px; box-shadow:0 0 12px rgba(110,68,255,0.2); }

/* 進捗ツリー：画面上部にfixed固定 */
.progress-tree {
  position:fixed; top:0; left:0; right:0; z-index:200;
  padding:10px 16px; display:flex; flex-wrap:wrap; gap:5px 2px; align-items:center; justify-content:center;
  background:rgba(10,9,22,0.97); border-bottom:1px solid rgba(201,168,76,0.2);
  -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px);
  box-shadow:0 2px 20px rgba(0,0,0,0.6);
}
.progress-tree:empty { display:none; }
.tree-node { display:inline-flex; align-items:center; gap:5px; font-size:10px; letter-spacing:0.03em; color:var(--gold-dim); padding:3px 9px; border:1px solid rgba(138,111,46,0.3); border-radius:12px; transition:all 0.3s; white-space:nowrap; }
.tree-node .node-dot { width:6px; height:6px; border-radius:50%; background:var(--gold-dim); transition:all 0.3s; }
.tree-node.done { color:var(--gold); border-color:rgba(201,168,76,0.5); }
.tree-node.done .node-dot { background:var(--gold); box-shadow:0 0 6px var(--gold); }
.tree-node.current { color:#c4b5fd; border-color:var(--magic); background:rgba(110,68,255,0.12); box-shadow:0 0 12px rgba(110,68,255,0.25); }
.tree-node.current .node-dot { background:var(--magic); box-shadow:0 0 8px var(--magic); animation:pulseDot 1.4s infinite; }
@keyframes pulseDot { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.4);opacity:0.6;} }
.tree-sep { color:rgba(138,111,46,0.4); font-size:9px; }

.chat-scroll { padding:24px 18px; display:flex; flex-direction:column; gap:18px; }
.qblock { display:flex; flex-direction:column; gap:18px; }
.msg { display:flex; gap:10px; align-items:flex-end; animation:msgAppear 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes msgAppear { from{opacity:0;transform:translateY(10px) scale(0.97);} to{opacity:1;transform:translateY(0) scale(1);} }
.msg.user { flex-direction:row-reverse; }
.avatar-bot { width:34px; height:34px; background:linear-gradient(135deg,#2a1f6e,#1a1240); border:1px solid var(--gold-dim); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; box-shadow:0 0 12px rgba(110,68,255,0.3); }
.bubble { max-width:78%; padding:12px 16px; font-size:13px; line-height:1.9; letter-spacing:0.03em; position:relative; }
.msg.bot .bubble { background:linear-gradient(135deg,#1e1b38,#16142e); border:1px solid rgba(201,168,76,0.2); border-radius:0 12px 12px 12px; color:var(--parchment); }
.msg.bot .bubble::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,var(--gold-dim),transparent); opacity:0.5; }
.msg.user .bubble { background:linear-gradient(135deg,#2d1f6e,#1f1550); border:1px solid rgba(110,68,255,0.4); border-radius:12px 0 12px 12px; color:#d4c8ff; box-shadow:0 0 16px rgba(110,68,255,0.15); }
.bubble .accent { color:var(--gold); font-weight:500; }
.typing-dots { display:flex; gap:5px; padding:4px; }
.typing-dots span { width:7px; height:7px; background:var(--gold-dim); border-radius:50%; animation:dotBounce 1.3s infinite; }
.typing-dots span:nth-child(2){animation-delay:0.2s;} .typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes dotBounce { 0%,60%,100%{transform:translateY(0);opacity:0.4;} 30%{transform:translateY(-7px);opacity:1;} }

.cmd-window { margin-left:44px; background:linear-gradient(135deg,#0d0d20,#0a0a1a); border:1px solid var(--gold-dim); padding:4px; animation:cmdAppear 0.35s ease 0.1s both; position:relative; }
@keyframes cmdAppear { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
.cmd-window::before { content:'── コマンド ──'; position:absolute; top:-9px; left:10px; font-size:9px; color:var(--gold-dim); letter-spacing:0.15em; background:#0a0a1a; padding:0 6px; }
.cmd-btn { display:flex; align-items:center; gap:8px; width:100%; background:transparent; border:none; border-bottom:1px solid rgba(201,168,76,0.08); color:var(--parchment); padding:11px 14px; font-size:13px; font-family:'Noto Serif JP',serif; text-align:left; cursor:pointer; transition:all 0.2s; letter-spacing:0.04em; line-height:1.5; }
.cmd-btn:last-child { border-bottom:none; }
.cmd-btn::before { content:'▶'; color:var(--gold); font-size:8px; opacity:0; transition:opacity 0.2s; flex-shrink:0; }
.cmd-btn:hover { background:rgba(201,168,76,0.08); color:var(--gold); padding-left:18px; }
.cmd-btn:hover::before { opacity:1; }

.multi-window { margin-left:44px; background:linear-gradient(135deg,#0d0d20,#0a0a1a); border:1px solid var(--gold-dim); padding:4px; animation:cmdAppear 0.35s ease 0.1s both; position:relative; }
.multi-window::before { content:'── 複数選択可 ──'; position:absolute; top:-9px; left:10px; font-size:9px; color:var(--gold-dim); letter-spacing:0.15em; background:#0a0a1a; padding:0 6px; }
.multi-btn { display:flex; align-items:center; gap:10px; width:100%; background:transparent; border:none; border-bottom:1px solid rgba(201,168,76,0.08); color:var(--parchment); padding:11px 14px; font-size:13px; font-family:'Noto Serif JP',serif; text-align:left; cursor:pointer; transition:all 0.2s; letter-spacing:0.04em; line-height:1.5; }
.multi-btn:last-of-type { border-bottom:none; }
.rune-check { width:17px; height:17px; border:1px solid var(--gold-dim); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:9px; color:transparent; transition:all 0.2s; background:rgba(0,0,0,0.3); }
.multi-btn.selected .rune-check { background:var(--magic); border-color:var(--magic); color:white; box-shadow:0 0 8px rgba(110,68,255,0.5); }
.multi-btn.selected { color:#c4b5fd; }
.confirm-rune-btn { margin:8px 4px 4px; display:block; width:calc(100% - 8px); background:linear-gradient(135deg,#2d1f6e,#1a1040); border:1px solid var(--magic); color:#c4b5fd; padding:11px; font-size:14px; font-family:'Cinzel',serif; letter-spacing:0.15em; cursor:pointer; transition:all 0.2s; box-shadow:0 0 12px rgba(110,68,255,0.2); }
.confirm-rune-btn:hover { background:var(--magic); color:white; box-shadow:0 0 20px rgba(110,68,255,0.4); }

.scroll-input-area { margin-left:44px; display:flex; flex-direction:column; gap:8px; animation:cmdAppear 0.35s ease 0.1s both; }
.scroll-input { background:linear-gradient(135deg,#0d0d20,#0a0a1a); border:1px solid var(--gold-dim); color:var(--parchment); padding:12px 14px; font-size:16px; font-family:'Noto Serif JP',serif; letter-spacing:0.04em; outline:none; transition:border-color 0.2s,box-shadow 0.2s; resize:vertical; min-height:50px; }
.scroll-input:focus { border-color:var(--gold); box-shadow:0 0 12px rgba(201,168,76,0.15); }
.scroll-input::placeholder { color:rgba(201,168,76,0.3); }
.cast-btn { align-self:flex-end; background:transparent; border:1px solid var(--gold); color:var(--gold); padding:9px 22px; font-size:14px; font-family:'Cinzel',serif; letter-spacing:0.2em; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
.cast-btn::before { content:''; position:absolute; inset:0; background:var(--gold); transform:scaleX(0); transform-origin:left; transition:transform 0.2s; z-index:-1; }
.cast-btn:hover { color:var(--ink); }
.cast-btn:hover::before { transform:scaleX(1); }

.rune-notice { margin-left:44px; background:rgba(139,26,26,0.1); border:1px solid rgba(139,26,26,0.4); border-left:3px solid var(--blood); color:#f4a0a0; padding:10px 14px; font-size:12px; line-height:1.7; letter-spacing:0.04em; animation:cmdAppear 0.35s ease 0.1s both; }

.lore-card { margin-left:44px; display:flex; flex-direction:column; gap:8px; animation:cmdAppear 0.35s ease 0.1s both; }
.lore-item { background:linear-gradient(135deg,#0d0d20,#0a0a1a); border:1px solid rgba(201,168,76,0.2); padding:12px 14px; }
.lore-label { font-family:'Cinzel',serif; font-size:11px; color:var(--gold); letter-spacing:0.2em; margin-bottom:6px; }
.lore-desc { font-size:13px; color:var(--parchment-dark); line-height:1.9; }
.lore-confirm-btn { background:transparent; border:1px solid var(--gold); color:var(--gold); padding:10px; font-size:14px; font-family:'Cinzel',serif; letter-spacing:0.2em; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
.lore-confirm-btn::before { content:''; position:absolute; inset:0; background:var(--gold); transform:scaleX(0); transform-origin:left; transition:transform 0.2s; z-index:-1; }
.lore-confirm-btn:hover { color:var(--ink); }
.lore-confirm-btn:hover::before { transform:scaleX(1); }

/* 確認画面カード */
.confirm-card { margin-left:44px; display:flex; flex-direction:column; gap:6px; animation:cmdAppear 0.35s ease 0.1s both; }
.confirm-row { display:flex; gap:8px; background:linear-gradient(135deg,#0d0d20,#0a0a1a); border:1px solid rgba(201,168,76,0.15); padding:10px 14px; }
.confirm-label { font-size:10px; color:var(--gold-dim); font-family:'Cinzel',serif; letter-spacing:0.1em; white-space:nowrap; min-width:80px; padding-top:2px; }
.confirm-value { font-size:13px; color:var(--parchment); line-height:1.7; }

.back-btn-wrap { margin-left:44px; margin-top:2px; animation:cmdAppear 0.35s ease 0.15s both; }
.back-btn { background:transparent; border:none; color:var(--gold-dim); font-size:12px; font-family:'Noto Serif JP',serif; letter-spacing:0.08em; cursor:pointer; padding:4px 0; transition:color 0.2s; }
.back-btn:hover { color:var(--gold); }

.quest-complete { text-align:center; padding:36px 20px; animation:msgAppear 0.6s ease; }
.complete-seal { font-size:52px; display:block; margin-bottom:18px; animation:sealAppear 0.8s cubic-bezier(0.34,1.56,0.64,1); filter:drop-shadow(0 0 20px var(--gold)); }
@keyframes sealAppear { from{transform:scale(0) rotate(-20deg);opacity:0;} to{transform:scale(1) rotate(0deg);opacity:1;} }
.complete-title { font-family:'Cinzel',serif; font-size:20px; color:var(--gold); letter-spacing:0.15em; margin-bottom:12px; text-shadow:0 0 20px rgba(201,168,76,0.4); }
.complete-text { font-size:13px; color:var(--parchment-dark); line-height:1.9; letter-spacing:0.05em; }
.divider { border:none; border-top:1px solid rgba(201,168,76,0.15); margin:4px 0; position:relative; }
.divider::after { content:'◆'; position:absolute; top:-7px; left:50%; transform:translateX(-50%); font-size:8px; color:var(--gold-dim); background:#14122a; padding:0 4px; }
/* ===== 派手アニメーション ===== */
/* 画面から飛び出す文字 */
.fx-word { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); z-index:9998; font-family:'Cinzel',serif; font-weight:700; color:var(--gold); text-shadow:0 0 20px var(--gold),0 0 40px rgba(201,168,76,0.6); pointer-events:none; white-space:nowrap; }
@keyframes fxWordBurst {
  0% { transform:translate(-50%,-50%) scale(0.2) rotate(-8deg); opacity:0; filter:blur(8px); }
  15% { opacity:1; filter:blur(0); }
  50% { transform:translate(-50%,-50%) scale(1.2) rotate(0deg); opacity:1; }
  100% { transform:translate(-50%,-200%) scale(2.8) rotate(4deg); opacity:0; filter:blur(6px); }
}
/* 画面フラッシュ */
.fx-flash { position:fixed; inset:0; z-index:9997; pointer-events:none; background:radial-gradient(circle at center, rgba(201,168,76,0.25), rgba(110,68,255,0.12) 40%, transparent 70%); }
@keyframes fxFlash { 0%{opacity:0;} 20%{opacity:1;} 100%{opacity:0;} }
/* 拡散リング */
.fx-ring { position:fixed; left:50%; top:50%; z-index:9996; pointer-events:none; border:2px solid var(--gold); border-radius:50%; transform:translate(-50%,-50%); }
@keyframes fxRing { 0%{width:0;height:0;opacity:0.9;border-width:3px;} 100%{width:120vmax;height:120vmax;opacity:0;border-width:1px;} }
/* 送信完了：複数文字が時間差で飛ぶ用 */
.fx-word.magic { color:#c4b5fd; text-shadow:0 0 20px var(--magic),0 0 40px rgba(110,68,255,0.7); }

/* ===== 全画面完了演出 ===== */
#complete-overlay {
  position:fixed; inset:0; z-index:500; display:none;
  flex-direction:column; align-items:center; justify-content:center;
  background:var(--ink);
}
#complete-overlay.show { display:flex; animation:overlayFadeOut 1.2s ease 8s forwards; }
@keyframes overlayFadeOut { to{opacity:0;pointer-events:none;} }
.complete-burst {
  position:absolute; inset:0;
  background:radial-gradient(circle at center, rgba(201,168,76,0.3) 0%, rgba(110,68,255,0.2) 40%, transparent 70%);
  opacity:0; animation:burstGlow 1.2s ease forwards;
}
@keyframes burstGlow { 0%{opacity:0;transform:scale(0.5);} 60%{opacity:1;transform:scale(1.2);} 100%{opacity:0.6;transform:scale(1);} }
.complete-msg {
  position:relative; z-index:1; text-align:center; padding:32px 24px;
  opacity:0; transform:translateY(30px);
  animation:msgRise 0.8s cubic-bezier(0.2,0.8,0.2,1) 0.6s forwards;
}
@keyframes msgRise { to{opacity:1;transform:translateY(0);} }
.complete-icon { font-size:72px; display:block; margin-bottom:20px; filter:drop-shadow(0 0 30px var(--gold)); animation:iconPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.8s both; }
@keyframes iconPop { from{transform:scale(0) rotate(-15deg);} to{transform:scale(1) rotate(0);} }
.complete-headline { font-family:'Cinzel',serif; font-size:clamp(24px,7vw,48px); color:var(--gold); letter-spacing:0.2em; text-shadow:0 0 40px rgba(201,168,76,0.8); margin-bottom:16px; }
.complete-sub { font-size:14px; color:var(--parchment-dark); line-height:2; letter-spacing:0.08em; }
.complete-sub .highlight { color:var(--gold); }

/* 名前ハイライト演出 */
.name-highlight { color:var(--gold); font-weight:500; display:inline-block; animation:nameGlow 0.6s ease; }
@keyframes nameGlow { 0%{text-shadow:none;} 50%{text-shadow:0 0 20px var(--gold),0 0 40px rgba(201,168,76,0.6);transform:scale(1.05);} 100%{text-shadow:0 0 8px rgba(201,168,76,0.3);} }

#scroll-bottom { height:1px; }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<!-- 全画面完了演出 -->
<div id="complete-overlay">
  <div class="complete-burst"></div>
  <div class="complete-msg">
    <span class="complete-icon">⚔️</span>
    <div class="complete-headline">QUEST COMPLETE</div>
    <div class="complete-sub" id="complete-sub-text"></div>
  </div>
</div>

<div id="opening">
  <div class="opening-crest">⚔️</div>
  <div class="opening-title">AI-TRY-LAB</div>
  <div class="opening-sub"><span class="typewriter" id="tw"></span></div>
  <button class="start-btn" onclick="beginAdventure()">── 扉を開く ──</button>
</div>

<!-- 進捗ツリー：fixed固定でscroll-cardの外に配置 -->
<div class="progress-tree" id="progress-tree"></div>

<div class="stage">
  <div class="scroll-card">
    <div class="card-header">
      <div class="guild-badge">⚜ AI-TRY-LAB ── ADVENTURERS GUILD ⚜</div>
      <div class="card-title">入部アンケート</div>
      <div class="card-desc">AIを自由に試せる社内部活動。<br>ぜひ参加を検討してください！</div>
      <div class="benefit-rune">✨ 入部特典 ── Claudeアカウントを発行します</div>
    </div>
    <div class="chat-scroll" id="chat">
      <div id="scroll-bottom"></div>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';
  const TEST_MODE = new URLSearchParams(location.search).has('test');

  if(!TEST_MODE){
    const c=document.getElementById('stars-canvas');
    const ctx=c.getContext('2d');
    if(ctx){
      let stars=[];
      const resize=()=>{c.width=innerWidth;c.height=innerHeight;};
      const init=()=>{stars=Array.from({length:110},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.1+0.2,speed:Math.random()*0.003+0.001,phase:Math.random()*Math.PI*2}));};
      const draw=(t)=>{ctx.clearRect(0,0,c.width,c.height);stars.forEach(s=>{const a=0.25+0.5*Math.sin(t*s.speed+s.phase);ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,190,255,${a})`;ctx.fill();});requestAnimationFrame(draw);};
      addEventListener('resize',()=>{resize();init();});
      resize();init();requestAnimationFrame(draw);
    }
  }

  const TW_TEXT='冒険者よ、AIの扉が開かれし時が来た';
  let twIdx=0; const twEl=document.getElementById('tw');
  const typeNext=()=>{if(twIdx<TW_TEXT.length){twEl.textContent=TW_TEXT.slice(0,++twIdx);setTimeout(typeNext,80);}};
  if(twEl) setTimeout(typeNext,600);

  window.beginAdventure=function(){
    const op=document.getElementById('opening');
    op.classList.add('fade-out');
    setTimeout(()=>{op.style.display='none';APP.startChat();},1000);
  };

  const FORM_URL='https://docs.google.com/forms/d/e/1FAIpQLSdQdAL2bKuzEBiOMJbE82Ktz8Xh_IXrwu3Wjimu1Vrutd_qPQ/formResponse';
  const E={name:'entry.1563501262',intention:'entry.711442765',membership:'entry.1484656040',style:'entry.1228801947',solo_team:'entry.1545187734',activities:'entry.1224507291',activities_other:'entry.1224507291.other_option_response',memo:'entry.1604430407',reason:'entry.500671168'};

  const chat=document.getElementById('chat');
  const tree=document.getElementById('progress-tree');
  let bottom=document.getElementById('scroll-bottom');

  const answers={};

  const TREE_STEPS=[
    {key:'name',label:'名前'},
    {key:'intention',label:'意向'},
    {key:'membership',label:'入部'},
    {key:'style',label:'スタイル'},
    {key:'detail',label:'詳細'},
    {key:'memo',label:'メモ'},
    {key:'reason',label:'理由'},
    {key:'confirm',label:'確認'},
  ];

  // steps: [{ treeKey, render:fn, answerKeys:[], block:DOM }]
  let steps=[];

  function delay(ms){ return new Promise(r=>setTimeout(r, TEST_MODE?0:ms)); }
  function scrollDown(){ if(TEST_MODE)return; setTimeout(()=>bottom.scrollIntoView({behavior:'smooth',block:'nearest'}),80); }

  function renderTree(currentKey){
    tree.innerHTML='';
    const doneKeys=new Set(steps.filter(s=>s.treeKey&&s.treeKey!==currentKey).map(s=>s.treeKey));
    TREE_STEPS.forEach((step,i)=>{
      if(i>0){const sep=document.createElement('span');sep.className='tree-sep';sep.textContent='›';tree.appendChild(sep);}
      const node=document.createElement('span');node.className='tree-node';
      node.innerHTML=`<span class="node-dot"></span>${step.label}`;
      if(step.key===currentKey)node.classList.add('current');
      else if(doneKeys.has(step.key))node.classList.add('done');
      tree.appendChild(node);
    });
  }

  function spawnParticles(x,y){
    if(TEST_MODE)return;
    const colors=['#c9a84c','#a78bfa','#6e44ff','#e8e4d8','#fbbf24'];
    for(let i=0;i<18;i++){
      const p=document.createElement('div');
      p.style.cssText=`position:fixed;left:${x}px;top:${y}px;width:${3+Math.random()*5}px;height:${3+Math.random()*5}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);`;
      document.body.appendChild(p);
      const ang=(Math.random()*360)*Math.PI/180,dist=40+Math.random()*80;
      const tx=Math.cos(ang)*dist,ty=Math.sin(ang)*dist;
      p.animate([{transform:'translate(-50%,-50%) scale(1)',opacity:1},{transform:`translate(calc(-50% + ${tx}px),calc(-50% + ${ty}px)) scale(0)`,opacity:0}],{duration:500+Math.random()*400,easing:'cubic-bezier(0,0,0.2,1)',fill:'forwards'}).onfinish=()=>p.remove();
    }
  }

  // ===== 派手アニメ：画面から文字が飛び出す =====
  function fxBurst(text, opts){
    if(TEST_MODE) return;
    opts = opts || {};
    const flash = document.createElement('div'); flash.className='fx-flash';
    flash.style.animation='fxFlash 0.8s ease-out forwards';
    document.body.appendChild(flash);
    flash.addEventListener('animationend',()=>flash.remove());
    const ring = document.createElement('div'); ring.className='fx-ring';
    ring.style.animation='fxRing 1s cubic-bezier(0.1,0.7,0.3,1) forwards';
    document.body.appendChild(ring);
    ring.addEventListener('animationend',()=>ring.remove());
    const word = document.createElement('div');
    word.className = 'fx-word' + (opts.magic?' magic':'');
    word.textContent = text;
    // 文字数に応じてフォントサイズを調整（長文でも画面に収まるように）
    const len = text.length;
    const size = opts.size || (len<=4?'clamp(36px,12vw,72px)':len<=8?'clamp(28px,9vw,56px)':'clamp(20px,6vw,40px)');
    word.style.fontSize = size;
    word.style.animation='fxWordBurst 1.4s cubic-bezier(0.2,0.8,0.2,1) forwards';
    document.body.appendChild(word);
    word.addEventListener('animationend',()=>word.remove());
  }

  // 送信完了：複数ワードを時間差で連発
  function fxFinale(words){
    if(TEST_MODE) return;
    words.forEach((wtext,i)=>{
      setTimeout(()=>{
        fxBurst(wtext,{magic:i%2===1, size:'clamp(32px,11vw,80px)'});
        for(let k=0;k<3;k++) setTimeout(()=>spawnParticles(innerWidth/2+(Math.random()-0.5)*260, innerHeight/2+(Math.random()-0.5)*260), k*80);
      }, i*420);
    });
  }

  function curBlock(){ return steps.length? steps[steps.length-1].block : null; }
  function appendToBlock(node){ const b=curBlock(); if(b) b.appendChild(node); else chat.insertBefore(node,bottom); }

  function addMsg(html,type='bot'){
    const w=document.createElement('div');
    w.className=`msg ${type}`;
    if(type==='bot') w.innerHTML=`<div class="avatar-bot">🔮</div><div class="bubble">${html}</div>`;
    else w.innerHTML=`<div class="bubble">${html}</div>`;
    appendToBlock(w); scrollDown();
    return w;
  }

  function addTyping(){
    const w=document.createElement('div');
    w.className='msg bot'; w.setAttribute('data-typing','1');
    w.innerHTML=`<div class="avatar-bot">🔮</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    appendToBlock(w); scrollDown();
    return w;
  }

  async function botSay(html,ms=700){
    const t=addTyping();
    await delay(ms);
    t.remove();
    addMsg(html,'bot');
  }

  function clearLiveUI(){
    const b=curBlock(); const scope=b||chat;
    scope.querySelectorAll('.cmd-window,.multi-window,.scroll-input-area,.back-btn-wrap,.lore-card').forEach(e=>e.remove());
  }

  function addBackBtn(){
    if(steps.length<=1) return;
    const wrap=document.createElement('div'); wrap.className='back-btn-wrap';
    const btn=document.createElement('button'); btn.className='back-btn'; btn.textContent='← 1つ前に戻る';
    btn.onclick=()=>goBack();
    wrap.appendChild(btn);
    appendToBlock(wrap); scrollDown();
  }

  function addCmdWindow(opts,onSelect){
    const win=document.createElement('div'); win.className='cmd-window';
    opts.forEach(opt=>{
      const btn=document.createElement('button'); btn.className='cmd-btn'; btn.textContent=opt;
      btn.onclick=(ev)=>{ spawnParticles(ev.clientX,ev.clientY); fxBurst(opt); clearLiveUI(); addMsg(opt,'user'); onSelect(opt); };
      win.appendChild(btn);
    });
    appendToBlock(win); addBackBtn(); scrollDown();
  }

  // その他入力欄CSS
  (function(){
    const s=document.createElement('style');
    s.textContent='.other-input-area{padding:4px 8px 6px;display:none;}.other-input-area.show{display:block;}.other-text-input{width:100%;background:linear-gradient(135deg,#0d0d20,#0a0a1a);border:1px solid var(--gold-dim);color:var(--parchment);padding:8px 12px;font-size:15px;font-family:"Noto Serif JP",serif;outline:none;box-sizing:border-box;}.other-text-input:focus{border-color:var(--gold);}';
    document.head.appendChild(s);
  })();

  function addMultiWindow(opts,onConfirm){
    const sel=[];
    let otherText='';
    const win=document.createElement('div'); win.className='multi-window';

    opts.forEach(opt=>{
      const isOther=(opt==='その他');
      const btn=document.createElement('button'); btn.className='multi-btn';
      btn.innerHTML=`<div class="rune-check" style="color:transparent">✓</div><span>${isOther?'その他（自由入力）':opt}</span>`;

      let otherArea=null;
      if(isOther){
        otherArea=document.createElement('div'); otherArea.className='other-input-area';
        const inp=document.createElement('input'); inp.className='other-text-input'; inp.placeholder='具体的に教えてください…'; inp.type='text';
        inp.addEventListener('input',()=>{ otherText=inp.value.trim(); });
        otherArea.appendChild(inp);
      }

      btn.onclick=()=>{
        const idx=sel.indexOf(opt);
        if(idx>=0){
          sel.splice(idx,1); btn.classList.remove('selected'); btn.querySelector('.rune-check').style.color='transparent';
          if(otherArea){ otherArea.classList.remove('show'); otherText=''; }
        }else{
          sel.push(opt); btn.classList.add('selected'); btn.querySelector('.rune-check').style.color='white';
          if(otherArea){ otherArea.classList.add('show'); setTimeout(()=>otherArea.querySelector('input').focus(),50); }
        }
      };
      win.appendChild(btn);
      if(otherArea) win.appendChild(otherArea);
    });

    const cb=document.createElement('button'); cb.className='confirm-rune-btn'; cb.textContent='── 選択を確定する ──';
    cb.onclick=(ev)=>{
      if(!sel.length){alert('ひとつ以上選択してください');return;}
      if(sel.includes('その他')&&!otherText){alert('「その他」の内容を入力してください');return;}
      spawnParticles(ev.clientX,ev.clientY); fxBurst('⚔ CONFIRMED',{magic:true}); clearLiveUI();
      const displaySel=sel.map(s=>s==='その他'?`その他：${otherText}`:s);
      addMsg(displaySel.join('、'),'user');
      onConfirm([...sel],otherText);
    };
    win.appendChild(cb);
    appendToBlock(win); addBackBtn(); scrollDown();
  }

  function addScrollInput(ph,onSubmit,multi=false){
    const area=document.createElement('div'); area.className='scroll-input-area';
    const inp=multi?document.createElement('textarea'):document.createElement('input');
    inp.className='scroll-input'; inp.placeholder=ph;
    if(!multi) inp.type='text';
    const btn=document.createElement('button'); btn.className='cast-btn'; btn.textContent='── 送信 ──';
    btn.onclick=(ev)=>{ const v=inp.value.trim(); if(!v){alert('入力してください');return;} spawnParticles(ev.clientX,ev.clientY); fxBurst('✦ SEALED',{magic:false}); clearLiveUI(); addMsg(v,'user'); onSubmit(v); };
    if(!multi) inp.onkeydown=e=>{ if(e.key==='Enter') btn.click(); };
    area.appendChild(inp); area.appendChild(btn);
    appendToBlock(area); addBackBtn();
    if(!TEST_MODE) setTimeout(()=>inp.focus(),100);
    scrollDown();
  }

  function addNotice(txt){
    const el=document.createElement('div'); el.className='rune-notice'; el.textContent=txt;
    appendToBlock(el); scrollDown();
  }

  function addLoreCard(items,btnTxt,onConfirm){
    const card=document.createElement('div'); card.className='lore-card';
    items.forEach(item=>{
      const el=document.createElement('div'); el.className='lore-item';
      el.innerHTML=`<div class="lore-label">${item.label}</div><div class="lore-desc">${item.desc}</div>`;
      card.appendChild(el);
    });
    if(btnTxt && onConfirm){
      const btn=document.createElement('button'); btn.className='lore-confirm-btn'; btn.textContent=btnTxt;
      btn.onclick=()=>{ onConfirm(); };
      card.appendChild(btn);
    }
    appendToBlock(card); scrollDown();
  }

  async function pushStep(treeKey, renderFn){
    const block=document.createElement('div'); block.className='qblock';
    chat.insertBefore(block, bottom);
    steps.push({ treeKey, render:renderFn, answerKeys:[], block });
    renderTree(treeKey);
    await renderFn();
  }

  function setAnswer(key,val){
    answers[key]=val;
    const s=steps[steps.length-1];
    if(s && !s.answerKeys.includes(key)) s.answerKeys.push(key);
  }

  async function goBack(){
    if(steps.length<=1) return;
    const cur=steps.pop();
    cur.answerKeys.forEach(k=>delete answers[k]);
    if(cur.block && cur.block.parentNode) cur.block.remove();
    const prev=steps.pop();
    prev.answerKeys.forEach(k=>delete answers[k]);
    if(prev.block && prev.block.parentNode) prev.block.remove();
    await pushStep(prev.treeKey, prev.render);
  }

  // ===== フロー =====
  async function startChat(){
    steps=[];
    isSubmitting=false;
    Object.keys(answers).forEach(k=>delete answers[k]);
    chat.innerHTML='<div id="scroll-bottom"></div>';
    bottom=document.getElementById('scroll-bottom');
    // 完了オーバーレイをリセット（CSSアニメを再生するためクラスを付け直す）
    const overlay=document.getElementById('complete-overlay');
    if(overlay){
      overlay.classList.remove('show');
      // アニメリセット：animation-nameを一瞬noneにすることで再トリガー
      const burst=overlay.querySelector('.complete-burst');
      const msg=overlay.querySelector('.complete-msg');
      if(burst){ burst.style.animation='none'; requestAnimationFrame(()=>{ burst.style.animation=''; }); }
      if(msg){ msg.style.animation='none'; requestAnimationFrame(()=>{ msg.style.animation=''; }); }
    }
    renderTree('name');
    await pushStep('name', async ()=>{
      await delay(400);
      await botSay('こんにちは！⚔️<br><span class="accent">AI-TRY-LAB</span>への入部アンケートを始めます。',800);
      await delay(300);
      await botSay('まず、お名前を教えてください。');
      addScrollInput('名前を入力…',(name)=>{ setAnswer('name',name); goIntention(); });
    });
  }

  async function goIntention(){
    await pushStep('intention', async ()=>{
      await botSay(`<span class="name-highlight">${answers.name}</span>さん、よろしくお願いします！<br><br>AI-TRY-LABへの入部意向を教えてください。`);
      addCmdWindow(['入部したい','条件次第で入部したい','検討中','今は見送り'],(choice)=>{
        setAnswer('intention',choice);
        if(choice==='今は見送り') goReason('見送り');
        else if(choice==='検討中') goActivities('検討中');
        else goMembership();
      });
    });
  }

  async function goMembership(){
    await pushStep('membership', async ()=>{
      await botSay('入部・体験入部、どちらを希望しますか？<br><span style="font-size:12px;color:#9a8a6a;">※体験入部は1ヶ月後に入部か退部かを確認します</span>');
      addCmdWindow(['入部したい','まずは体験入部したい'],(choice)=>{ setAnswer('membership',choice); goStyle(); });
    });
  }

  async function goStyle(){
    await pushStep('style', async ()=>{
      await botSay('活動スタイルを教えてください。');
      addLoreCard([
        {label:'稼働時間内で活動したい',desc:'業務として取り組みます。個人またはチームで活動し、成果物の提出や定例会での発表をお願いする場合があります。'},
        {label:'稼働時間外で活動したい',desc:'自分のペースでAIを自由に試せます。会社アカウント使用のため、活動レポート提出をお願いする可能性があります。レポート作成時間は稼働扱い（目安1時間程度）。'}
      ],null,null);
      addCmdWindow(['稼働時間内で活動したい','稼働時間外で活動したい'],(choice)=>{
        setAnswer('style',choice);
        if(choice==='稼働時間内で活動したい') goSoloTeam();
        else goStyleOut();
      });
    });
  }

  async function goSoloTeam(){
    await pushStep('detail', async ()=>{
      await botSay('個人・チーム、どちらで活動したいですか？');
      addCmdWindow(['個人で活動したい','チームで活動したい'],(choice)=>{ setAnswer('solo_team',choice); goActivities('通常'); });
    });
  }

  async function goStyleOut(){
    await pushStep('detail', async ()=>{
      await botSay('稼働時間外での活動について、確認事項があります。');
      addNotice('⚠ 会社のアカウントを使用するため、活動状況のレポート提出をお願いする可能性があります。レポート作成時間は稼働扱い（目安1時間程度）。AIを使ったレポート作成もOKですが、自分の感想・所感と活動内容の記載が必要です。');
      await delay(300);
      await botSay('興味のある活動内容を選んでください。複数選択できます。');
      addMultiWindow(['Claudeをとにかく使ってみたい','アプリを作ってみたい','ゲームを作ってみたい','Webサイトを作ってみたい','社内ツールを作ってみたい','業務効率化に使いたい','その他'],(sel,otherText)=>{ setAnswer('activities',sel); if(otherText) setAnswer('activities_other',otherText); goMemo(); });
    });
  }

  // 興味のある活動（検討中ルートでも使用）
  async function goActivities(route){
    await pushStep('detail', async ()=>{
      await botSay('興味のある活動内容を選んでください。複数選択できます。');
      addMultiWindow(['Claudeをとにかく使ってみたい','アプリを作ってみたい','ゲームを作ってみたい','Webサイトを作ってみたい','社内ツールを作ってみたい','業務効率化に使いたい','その他'],(sel,otherText)=>{
        setAnswer('activities',sel);
        if(otherText) setAnswer('activities_other',otherText);
        if(route==='検討中') goReason('検討中');
        else goMemo();
      });
    });
  }

  // 通常ルート：質問メモ
  async function goMemo(){
    await pushStep('memo', async ()=>{
      await botSay('最後に、質問・確認したいこと・こういう条件なら入りたい、など自由に書いてください。<br><span style="font-size:12px;color:#9a8a6a;">（なければ「なし」と入力）</span>');
      addScrollInput('質問、条件、確認事項など…',(memo)=>{ setAnswer('memo',memo); goConfirm(); },true);
    });
  }

  // 検討中・見送りルート：理由
  async function goReason(route){
    await pushStep('reason', async ()=>{
      const label = route==='見送り'
        ? '見送りの理由や気になっていることがあれば教えてください。<br><span style="font-size:12px;color:#9a8a6a;">（なければ「なし」と入力）</span>'
        : '検討中の理由や気になっていることを教えてください。<br><span style="font-size:12px;color:#9a8a6a;">（なければ「なし」と入力）</span>';
      await botSay(label);
      addScrollInput('理由や気になること…',(reason)=>{ setAnswer('reason',reason); goConfirm(); },true);
    });
  }

  async function goConfirm(){
    await pushStep('confirm', async ()=>{
      await botSay('以下の内容で送信します。よろしいですか？');
      // カード形式で表示
      const card=document.createElement('div'); card.className='confirm-card';
      const rows=[
        {label:'名前',value:answers.name},
        {label:'入部意向',value:answers.intention},
        answers.membership?{label:'入部/体験',value:answers.membership}:null,
        answers.style?{label:'活動スタイル',value:answers.style}:null,
        answers.solo_team?{label:'個人/チーム',value:answers.solo_team}:null,
        answers.activities?{label:'興味ある活動',value:(Array.isArray(answers.activities)?answers.activities:([answers.activities])).map(a=>a==='その他'&&answers.activities_other?`その他：${answers.activities_other}`:a).join('、')}:null,
        answers.memo?{label:'質問メモ',value:answers.memo}:null,
        answers.reason?{label:'理由',value:answers.reason}:null,
      ].filter(Boolean);
      rows.forEach(({label,value})=>{
        const row=document.createElement('div'); row.className='confirm-row';
        row.innerHTML=`<div class="confirm-label">${label}</div><div class="confirm-value">${value}</div>`;
        card.appendChild(row);
      });
      appendToBlock(card);
      const hr=document.createElement('hr'); hr.className='divider'; appendToBlock(hr);
      addCmdWindow(['── 送信する ──','最初からやり直す'],async (choice)=>{
        if(choice.includes('送信')){
          await botSay('送信中です…⌛',400);
          const ok=await submitForm();
          showComplete(ok);
        }else{
          startChat();
        }
      });
    });
  }

  function buildFormData(){
    const d=[];
    d.push([E.name,answers.name||'']);
    d.push([E.intention,answers.intention||'']);
    if(answers.membership) d.push([E.membership,answers.membership]);
    if(answers.style) d.push([E.style,answers.style]);
    if(answers.solo_team) d.push([E.solo_team,answers.solo_team]);
    if(answers.activities){
      (Array.isArray(answers.activities)?answers.activities:[answers.activities]).forEach(a=>{
        // その他は__other_option__として送信
        d.push([E.activities, a==='その他'?'__other_option__':a]);
      });
      // その他の自由入力テキスト
      if(answers.activities_other) d.push([E.activities_other, answers.activities_other]);
    }
    if(answers.memo) d.push([E.memo,answers.memo]);
    if(answers.reason) d.push([E.reason,answers.reason]);
    return d;
  }

  // 画面デバッグ表示（?debug=1 のときだけ出す）
  const DEBUG = new URLSearchParams(location.search).has('debug');
  function dbg(msg){
    if(!DEBUG) return;
    let box=document.getElementById('dbgbox');
    if(!box){
      box=document.createElement('div'); box.id='dbgbox';
      box.style.cssText='position:fixed;left:0;right:0;bottom:0;max-height:45vh;overflow:auto;background:rgba(0,0,0,0.92);color:#7CFC9A;font-family:monospace;font-size:11px;line-height:1.5;padding:10px;z-index:99999;border-top:2px solid #7CFC9A;white-space:pre-wrap;word-break:break-all;';
      document.body.appendChild(box);
    }
    const t=new Date().toLocaleTimeString();
    box.textContent += `[${t}] ${msg}\n`;
    box.scrollTop=box.scrollHeight;
  }

  let isSubmitting=false; // 二重送信防止
  async function submitForm(){
    if(isSubmitting){ dbg('既に送信処理中のためスキップ'); return false; }
    isSubmitting=true;
    const data = buildFormData();
    dbg('=== 送信開始 ===');
    dbg('URL: '+FORM_URL);
    data.forEach(([k,v])=>dbg('  '+k+' = '+v));

    const params = new URLSearchParams();
    data.forEach(([k,v])=>params.append(k,v));
    const body = params.toString();

    // fetch no-cors 1方式のみ（スマホSafariで実績あり。二重送信を防ぐため1方式に統一）
    let ok=false;
    try{
      dbg('fetch(no-cors) 送信...');
      await fetch(FORM_URL, {
        method:'POST',
        mode:'no-cors',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body: body
      });
      ok=true;
      dbg('送信完了（no-corsのため成否は不明だが送信は飛んだ）');
    }catch(e){
      dbg('送信失敗: '+(e&&e.message));
    }

    dbg('=== 送信処理おわり ===');
    return ok;
  }

  function showComplete(ok){
    clearLiveUI();
    if(ok){
      // 全画面演出
      const overlay=document.getElementById('complete-overlay');
      const subText=document.getElementById('complete-sub-text');
      subText.innerHTML=`冒険者 <span class="highlight">${answers.name||''}</span> よ、<br>AI-TRY-LABへの参加申請を受け付けた。<br><br>近日中に連絡が届くであろう。<br>共にAIの可能性を切り拓こう。<br><br><span style="font-size:11px;color:var(--gold-dim);letter-spacing:0.2em;">── AI-TRY-LAB ──</span>`;
      overlay.classList.add('show');
      // パーティクル連発
      if(!TEST_MODE){
        for(let i=0;i<8;i++) setTimeout(()=>spawnParticles(innerWidth/2+(Math.random()-0.5)*300,innerHeight/2+(Math.random()-0.5)*300),i*200);
        fxFinale(['QUEST','COMPLETE','✦']);
      }
      renderTree(null);
    }else{
      isSubmitting=false;
      const el=document.createElement('div'); el.className='quest-complete';
      el.innerHTML=`<span class="complete-seal">⚠️</span><div class="complete-title" style="color:#f4a0a0;">送信に失敗しました</div><div class="complete-text">通信エラーが発生した可能性があります。<br>回答内容は保持されています。</div>`;
      appendToBlock(el);
      addCmdWindow(['── もう一度送信する ──','最初からやり直す'],async(choice)=>{
        if(choice.includes('もう一度')){
          await botSay('再送信します…⌛',400);
          const ok2=await submitForm();
          showComplete(ok2);
        }else{
          startChat();
        }
      });
      scrollDown();
    }
  }

  // ===== テスト用公開API =====
  window.APP={
    startChat, goBack, buildFormData, submitForm,
    get answers(){ return answers; },
    get steps(){ return steps; },
    get TEST_MODE(){ return TEST_MODE; },
    _click(selector, index=0){
      const b=curBlock()||chat;
      const els=b.querySelectorAll(selector);
      if(els[index]){ els[index].click(); return true; }
      return false;
    },
    _clickText(selector, text){
      const b=curBlock()||chat;
      const els=[...b.querySelectorAll(selector)];
      const el=els.find(e=>e.textContent.includes(text));
      if(el){ el.click(); return true; }
      return false;
    },
    _type(value){
      const b=curBlock()||chat;
      const inp=b.querySelector('.scroll-input');
      if(inp){ inp.value=value; return true; }
      return false;
    },
    _treeState(){
      return [...tree.querySelectorAll('.tree-node')].map(n=>({label:n.textContent.trim(),current:n.classList.contains('current'),done:n.classList.contains('done')}));
    },
    _flow:{ goIntention, goMembership, goStyle, goSoloTeam, goStyleOut, goActivities, goMemo, goReason, goConfirm },
  };

})();
</script>
</body>
</html>
